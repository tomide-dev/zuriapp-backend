name: Backend CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run npm Audit
        run: npm audit --audit-level=high

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/zuriapp-backend:${{ github.sha }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/zuriapp-backend:latest \
            .

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/zuriapp-backend:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/zuriapp-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/zuriapp-backend:latest

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          cat <<EOF > ~/.kube/config
          ${{ secrets.KUBECONFIG_DATA }}
          EOF
          chmod 600 ~/.kube/config

      - name: Verify Kubernetes Connection
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Update Deployment Image
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|${{ secrets.DOCKERHUB_USERNAME }}/zuriapp-backend:${{ github.sha }}|g" kubernetes/backend-deployment.yaml

      - name: Deploy Backend
        run: |
          kubectl apply -f kubernetes/

      - name: Wait For Rollout
        run: |
          kubectl rollout status deployment/backend-deployment --timeout=180s

      - name: Verify Deployment
        run: |
          kubectl get deployments
          kubectl get pods -o wide
          kubectl get svc